services:
  documind:
    build: .
    container_name: documind
    ports:
      - "8000:8000"
    volumes:
      - documind-data:/data
    env_file:
      - .env
    environment:
      - DOCUMIND_DATA_DIR=/data
    restart: unless-stopped
    # Resource limits (optional — lighter now without local LLM)
    deploy:
      resources:
        limits:
          memory: 2G

volumes:
  documind-data:
    driver: local

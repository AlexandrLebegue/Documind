services:
  documind:
    build: .
    container_name: documind
    ports:
      - "8000:8000"
    volumes:
      - documind-data:/data
    env_file:
      - .env
    environment:
      - DOCUMIND_DATA_DIR=/data
    restart: unless-stopped
    # Resource limits (optional — lighter now without local LLM)
    deploy:
      resources:
        limits:
          memory: 2G

volumes:
  documind-data:
    driver: local
    driver_opts:
      type: cifs
      device: "//192.168.1.100/NAS_Commun_Vol2/DOCUMIND"
      o: "addr=192.168.1.100,username=${NAS_USERNAME:-guest},password=${NAS_PASSWORD:-},file_mode=0777,dir_mode=0777,vers=3.0"

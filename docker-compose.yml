services:
  documind:
    build:
      context: .
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
    container_name: documind
    ports:
      - "8000:8000"
    volumes:
      - documind-data:/data
    env_file:
      - .env
    environment:
      - DOCUMIND_DATA_DIR=/data
    cap_add:
      - SYS_ADMIN
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

volumes:
  documind-data:
    driver: local
